<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TokBopper</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo { font-size: 2.4rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
    .cursor { display: inline-block; color: #fe2c55; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    p { color: #999; font-size: 1rem; max-width: 420px; text-align: center; line-height: 1.6; margin-bottom: 40px; }
    nav { display: flex; gap: 24px; }
    nav a { color: #aaa; font-size: 0.9rem; text-decoration: none; border-bottom: 1px solid transparent; transition: color 0.15s, border-color 0.15s; }
    nav a:hover { color: #f0f0f0; border-color: #f0f0f0; }
    .logo-img { width: 96px; height: 96px; object-fit: contain; margin-bottom: 16px; border-radius: 20px; }
  </style>
</head>
<body>
  <img src="logo.png" alt="TokBopper" class="logo-img" />
  <div class="logo">TokBopper<span class="cursor">█</span></div>
  <p>A personal desktop tool for scheduling and automating video posts to TikTok via the TikTok Content Posting API.</p>
  <nav>
    <a href="terms.html">Terms of Service</a>
    <a href="privacy.html">Privacy Policy</a>
  </nav>
</body>
</html>
