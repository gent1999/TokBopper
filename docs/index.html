<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BopperX</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo { font-size: 2.4rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
    .cursor { display: inline-block; color: #fe2c55; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    p { color: #999; font-size: 1rem; max-width: 420px; text-align: center; line-height: 1.6; margin-bottom: 40px; }
    nav { display: flex; gap: 16px; }
    nav a { color: #fff; font-size: 0.95rem; text-decoration: none; background: #1a1a1a; border: 1px solid #333; padding: 8px 20px; border-radius: 6px; transition: background 0.15s, border-color 0.15s; }
    nav a:hover { background: #222; border-color: #555; }
    .logo-img { width: 96px; height: 96px; object-fit: contain; margin-bottom: 16px; border-radius: 20px; }
  </style>
</head>
<body>
  <img src="logo.png" alt="BopperX" class="logo-img" />
  <div class="logo">BopperX<span class="cursor">█</span></div>
  <p>A web-based content management tool designed for creators and agencies to manage and publish TikTok videos. Users can upload, organize, and schedule video content, with captions generated automatically from filenames to streamline workflows.</p>
  <nav>
    <a href="terms.html">Terms of Service</a>
    <a href="privacy.html">Privacy Policy</a>
  </nav>
</body>
</html>
